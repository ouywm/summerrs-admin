[package]
edition = "2024"
name = "summer-ai-relay"
version = "0.0.1"

[dependencies]
anyhow = { workspace = true }
async-stream = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
