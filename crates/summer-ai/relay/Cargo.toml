hex = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream"] }
sea-orm = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
summer = { workspace = true }
summer-ai-billing = { workspace = true }
summer-ai-core = { workspace = true, features = ["axum"] }
summer-ai-model = { workspace = true }
summer-common = { workspace = true }
summer-plugins = { workspace = true }
summer-sea-orm = { workspace = true, features = [
    "postgres",
    "rustls",
    "with-web",
    "with-web-openapi",
] }
summer-web = { workspace = true, features = ["openapi"] }
tokio = { workspace = true }
