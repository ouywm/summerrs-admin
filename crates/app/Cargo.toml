[package]
name = "app"
version = "0.0.1"
edition = "2024"

[dependencies]
anyhow = { workspace = true }
axum-client-ip = { workspace = true, features = ["connect-info", "serde", "forwarded-header"] }
axum-valid = { workspace = true }
chrono = { workspace = true }
common = { workspace = true }
flume = { workspace = true }
futures = { workspace = true }
macros = { workspace = true }
model = { workspace = true }
regex = { workspace = true }
schema = { workspace = true }
schemars = { workspace = true, features = ["derive", "chrono04"] }
sea-orm = { workspace = true, features = ["with-chrono", "sqlx-postgres", "runtime-tokio-rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
spring = { workspace = true }
spring-job = { workspace = true }
spring-redis = { workspace = true }
spring-sa-token = { workspace = true, features = ["with-web", "with-spring-redis", "openapi"] }
spring-web = { workspace = true, features = ["openapi", "openapi-swagger"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tower = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
validator = { workspace = true }
woothee = { workspace = true }
ip2region = { workspace = true }
rustc-hash = { workspace = true }

[dev-dependencies]
criterion = { workspace = true, features = ["async_tokio"] }
kanal = { workspace = true }

[[bench]]
name = "task_queue"
harness = false
