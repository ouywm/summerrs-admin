[package]
name = "app"
version = "0.0.1"
edition = "2024"

[dependencies]
summer = { workspace = true }
summer-web = { workspace = true, features = ["openapi", "openapi-swagger", "multipart", "socket_io"] }
summer-sea-orm = { workspace = true, features = ["postgres", "rustls", "with-web", "with-web-openapi"] }
summer-redis = { workspace = true }
summer-job = { workspace = true }
summer-mail = { workspace = true }
summer-auth = { workspace = true, features = ["web", "redis", "openapi"] }

summer-system = { workspace = true }
summer-plugins = { workspace = true }
summer-mcp = { workspace = true }
summer-rig = { workspace = true }

axum-client-ip = { workspace = true, features = ["connect-info"] }
tower-http = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, features = ["full"] }

regex = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
