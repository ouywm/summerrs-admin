# Docker Compose —— summerrs-admin 单机部署。
services:
  postgres:
    image: postgres:17-alpine
    container_name: summerrs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-summerrs-admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-summerrs-admin}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - summerrs

  redis:
    image: redis:7-alpine
    container_name: summerrs-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - summerrs

  rustfs:
    image: rustfs/rustfs:latest
    container_name: summerrs-rustfs
    restart: unless-stopped
    environment:
      # RustFS 启动凭证(首次启动后会作为 root,建议配合 IAM 收敛权限)
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    networks:
      - summerrs

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: app
    image: summerrs-admin:latest
    container_name: summerrs-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
    environment:
      SUMMER_ENV: prod
      RUST_LOG: ${RUST_LOG:-info}

      # ─ 数据库 ─
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-summerrs-admin}

      # ─ Redis ─
      REDIS_URL: redis://redis:6379/

      # ─ S3 / RustFS ─
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-summer-admin}
      S3_REGION: ${S3_REGION:-us-east-1}

      # ─ 鉴权 ─
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET}
    volumes:
      # 日志持久化(进程内 log-batch 写入)。如果 prod toml 关掉文件 sink 可以删
      - app_logs:/app/logs
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - summerrs

networks:
  summerrs:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  app_logs:
