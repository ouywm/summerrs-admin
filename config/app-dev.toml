[logger]
level = "debug"


[web]
port = 8080
graceful = true
global_prefix = "/api"
connect_info = true

[web.openapi]
doc_prefix = "/docs"
info = { title = "summerrs-admin", version = "0.0.1" }

[web.middlewares]
static = { enable = true }
compression = { enable = true }
logger = { enable = true, level = "warn" }
catch_panic = { enable = false }
timeout_request = { enable = true, timeout = 30000 }
limit_payload = { enable = true, body_limit = "1GB" }
cors = { enable = true, allow_origins = [
    "*",
], allow_headers = [
    "Authorization",
    "Content-Type",
], allow_methods = [
    "GET",
    "POST",
    "PUT",
    "DELETE",
], max_age = 60 }


[sea-orm]
uri = "postgres://admin:123456@localhost/summerrs-admin?options=-c%20TimeZone%3DAsia%2FShanghai"
enable_logging = true

[sea-orm-web]
one_indexed = true
default_page_size = 20
max_page_size = 2000

[redis]
uri = "redis://127.0.0.1/"

[ip2region]
ipv4_db_path = "./data/ip2region_v4.xdb"
# ipv6_db_path = "./data/ip2region_v6.xdb"

[auth]
token_name = "Authorization"
token_prefix = "Bearer "
token_style = "jwt"
access_timeout = 5
refresh_timeout = 10
concurrent_login = true
max_devices = 5
is_read_cookie = false
jwt_issuer = "summer-admin"
jwt_audience = "summer-admin"
# cookie_name = "token"
#jwt_algorithm = "HS256"
#jwt_secret = "SRKhqjfTyXMjnfMW0419DJfZFqxnsF97AQMk5soPlnk2dI/O0dUR3GIp/OUHXTptzR7DqlXJsQ99GUK6v28YcA=="
jwt_algorithm = "RS256"
jwt_private_key = "./data/rsa_private.pem"
jwt_public_key = "./data/rsa_public.pem"

# Per-UserType 覆盖示例:
# [auth.customer]
# token_style = "uuid"
# access_timeout = 3600
# refresh_timeout = 86400

[auth.admin]
token_style = "uuid"
access_timeout = 7200
refresh_timeout = 604800

[log-batch]
batch_size = 100

[mail]
stub = true
test_connection = false

[s3]
endpoint = "http://localhost:9000"
region = "us-east-1"
access_key = "bvqw5TKkyLU8GPgtjhId"
secret_key = "lE1tiudk0UrGfsbp5wH6vKqmM4N7T3QWCLXcIhRZ"
bucket = "summer-admin"

# ── 传输层（全部可选，不写则用 SDK 默认值） ──
# force_path_style = true          # MinIO/RustFS 必须 true（默认 true）
# connect_timeout = 5000           # 连接超时 5s
# operation_timeout = 30000        # 操作超时 30s
# operation_attempt_timeout = 10000

# ── 重试（可选） ──
# max_attempts = 3
# retry_mode = "standard"          # "standard" | "adaptive"

# ── 流保护（可选） ──
# stalled_stream_protection = true
# stalled_stream_grace_period = 5  # 秒

# ── 校验（可选） ──
# request_checksum = "when_supported"   # "when_supported" | "when_required"
# response_checksum = "when_supported"  # "when_supported" | "when_required"

# ── CDN / 自定义域名（可选） ──
# custom_domain = "https://static.oywm.top"  # 设置后 public_url 使用此域名，格式: {domain}/{key}

# ── 业务层 ──
max_file_size = 5242880000               # 5000MB
presign_expiry = 3600                   # presigned URL 有效期（秒）
multipart_threshold = 10485760          # 10MB，超过此大小使用分片上传
multipart_chunk_size = 10485760         # 每个分片 10MB
allowed_extensions = []                 # 为空则不限制，否则白名单如 ["jpg","png","pdf"]
multipart_max_age = 86400               # 分片上传最大存活时间（秒），默认 24 小时
