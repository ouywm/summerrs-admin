# Production Configuration
# Override settings from app.toml for production environment

[web.middlewares]
limit_payload = { enable = true, body_limit = "1GB" }

[mail]
stub = false
test_connection = true
host = "smtp.example.com"
port = 465
secure = true
auth = { user = "noreply@example.com", password = "your-password" }

[s3]
endpoint = "http://localhost:9000"
region = "us-east-1"
access_key = "minioadmin"
secret_key = "minioadmin"
bucket = "public"
max_file_size = 524288000
presign_expiry = 3600
multipart_threshold = 10485760
multipart_chunk_size = 10485760
allowed_extensions = []